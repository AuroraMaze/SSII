version: '3.9'

services:
  mongo:
    image: mongo:7.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: cookit
    volumes:
      - mongo-data:/data/db

  web:
    build: .
    restart: unless-stopped
    ports:
      - "8001:8001"
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-cookit}
    volumes:
      - ./backend:/app/backend
      - ./javascript:/app/javascript
      - ./html:/app/html
      - ./css:/app/css
      - ./image:/app/image

volumes:
  mongo-data:
