<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <script>try{var t=localStorage.getItem('cookit-theme');if((!t&&window.matchMedia('(prefers-color-scheme: dark)').matches)||t==='dark'){document.documentElement.classList.add('dark-mode');}}catch(e){}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/info-pages.css">
  <link rel="stylesheet" href="/css/darkmode.css">
  <script defer src="/javascript/darkmode.js"></script>
</head>
<body class="info-page">
  <main class="info-shell">
    <section class="info-hero">
      <p class="info-kicker">Account</p>
      <h1>Reset your password</h1>
      <p class="info-lead">Password reset email flow is not implemented on the backend yet. Use support for manual reset during this project stage.</p>
      <div class="info-actions">
        <a class="info-button" href="mailto:support@cookit.com?subject=Cookit%20Password%20Reset">Request password reset</a>
        <a class="info-button ghost" href="/html/Login.html">Back to login</a>
      </div>
    </section>
  </main>
</body>
</html>
