<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Careers</title>
  <script>try{var t=localStorage.getItem('cookit-theme');if((!t&&window.matchMedia('(prefers-color-scheme: dark)').matches)||t==='dark'){document.documentElement.classList.add('dark-mode');}}catch(e){}</script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/home.css">
  <link rel="stylesheet" href="/css/info-pages.css">
  <link rel="stylesheet" href="/css/darkmode.css">
  <script defer src="/javascript/darkmode.js"></script>
</head>
<body class="info-page">
  <main class="info-shell">
    <section class="info-hero">
      <p class="info-kicker">Careers</p>
      <h1>Join the team</h1>
      <p class="info-lead">There are no open roles published in this project build yet. Send interest and portfolio details to support for future contact.</p>
      <div class="info-actions">
        <a class="info-button" href="mailto:support@cookit.com?subject=Cookit%20Careers">Email careers</a>
      </div>
    </section>
  </main>
</body>
</html>
