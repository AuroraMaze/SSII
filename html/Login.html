<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Sign In / Sign Up</title>
	<link rel="stylesheet" href="/css/Login.css" />
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>
<h2>Sign in / Sign up</h2>
<div class="container" id="container">
	<div class="form-container sign-up-container">
		<form id="signUpForm" novalidate>
			<h1>Create Account</h1>
			<div class="social-container">
				<a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
				<a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
				<a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
			</div>
			<span>or use your email for registration</span>
			<input id="signUpName" type="text" placeholder="Name" autocomplete="name" required />
			<input id="signUpEmail" type="email" placeholder="Email" autocomplete="email" required />
			<input id="signUpPassword" type="password" placeholder="Password" autocomplete="new-password" required />
			<p class="form-message" id="signUpMessage"></p>
			<button type="submit">Sign Up</button>
		</form>
	</div>
	<div class="form-container sign-in-container">
		<form id="signInForm" novalidate>
			<h1>Sign in</h1>
			<div class="social-container">
				<a href="#" class="social"><i class="fab fa-facebook-f"></i></a>
				<a href="#" class="social"><i class="fab fa-google-plus-g"></i></a>
				<a href="#" class="social"><i class="fab fa-linkedin-in"></i></a>
			</div>
			<span>or use your account</span>
			<input id="signInEmail" type="email" placeholder="Email" autocomplete="email" required />
			<input id="signInPassword" type="password" placeholder="Password" autocomplete="current-password" required />
			<p class="form-message" id="signInMessage"></p>
			<a href="#">Forgot your password?</a>
			<button type="submit">Sign In</button>
            
		</form>
	</div>
	<div class="overlay-container">
		<div class="overlay">
			<div class="overlay-panel overlay-left">
				<h1>Welcome Back!</h1>
				<p>To keep connected with us please login with your personal info</p>
				<button class="ghost" id="signIn" type="button">Sign In</button>
			</div>
			<div class="overlay-panel overlay-right">
				<h1>Hello, Friend!</h1>
				<p>Enter your personal details and start journey with us</p>
				<button class="ghost" id="signUp" type="button">Sign Up</button>
			</div>
		</div>
	</div>
</div>

<footer>

  <script src="/javascript/Login.js"></script>
</footer>
</body>
</html>
